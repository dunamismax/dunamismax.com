name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: dunamismax-com-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt --component clippy
          rustup default stable

      - name: Install Node deps (Tailwind)
        run: npm ci

      - name: Rust format
        run: cargo fmt --all --check

      - name: Rust clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Rust tests
        run: cargo test --workspace --all-features

      - name: Rust content validation
        run: cargo test -p dunamismax-site content::tests::loads_repository_content_tree --all-features

      - name: Rust build
        run: cargo build --workspace

      - name: Rust release build
        run: cargo build -p dunamismax-site --release

      - name: Maven build + test
        run: ./mvnw --batch-mode clean verify
