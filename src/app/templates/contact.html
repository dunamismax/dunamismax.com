{% extends "base.html" %}
{% block head %}<link rel="stylesheet" href="/static/css/contact.css">{% endblock %}
{% block content %}
<div class="contact">
    <h1>Contact</h1>
    <p class="lead">Best way to reach me is email or Signal. I read everything.</p>

    <ul class="channels">
        {% for ch in channels %}
        <li class="channel">
            <span class="channel-label">{{ ch.label }}</span>
            <a href="{{ ch.href }}"
               {% if ch.external %}target="_blank" rel="noopener noreferrer"{% endif %}>
                {{ ch.display }}
            </a>
        </li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
