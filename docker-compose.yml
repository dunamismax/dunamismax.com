# dunamismax.com
#
# Intended to sit behind an external Caddy reverse proxy that handles TLS.
# The container serves static files on port 80 only.
#
# Build and run:
#   docker compose up -d --build
#
# Rebuild after content changes:
#   docker compose up -d --build --force-recreate

services:
  web:
    build: .
    restart: unless-stopped
    ports:
      - "8080:80"
    labels:
      - "app=dunamismax-com"
      - "description=Static personal site served by Caddy"
