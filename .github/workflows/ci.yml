name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: dunamismax-com-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-site:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Frontend lint
        run: bun run lint

      - name: Frontend type check
        run: bun run check

      - name: Frontend tests
        run: bun run test

      - name: Frontend build
        run: bun run build

      - name: Smoke check built site
        working-directory: .
        run: python3 scripts/smoke.py
