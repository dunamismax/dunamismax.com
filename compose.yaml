services:
  postgres:
    image: postgres:18-alpine
    container_name: dunamismax-postgres
    environment:
      POSTGRES_DB: dunamismax
      POSTGRES_USER: dunamismax
      POSTGRES_PASSWORD: dunamismax
    ports:
      - "5432:5432"
    volumes:
      - dunamismax_pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dunamismax -d dunamismax"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  dunamismax_pgdata:
