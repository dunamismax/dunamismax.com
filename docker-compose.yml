# dunamismax.com
#
# Intended to sit behind an external Caddy reverse proxy that handles TLS.
# The container runs Uvicorn on port 8000.
#
# Build and run:
#   docker compose up -d --build
#
# Rebuild after content or deploy-config changes:
#   docker compose build --no-cache web
#   docker compose up -d --force-recreate web

services:
  web:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8000"
    labels:
      - "app=dunamismax-com"
      - "description=Personal site served by FastAPI + Uvicorn"
