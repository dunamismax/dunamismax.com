spring:
  application:
    name: dunamismax-site
  threads:
    virtual:
      enabled: true
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: true
      cache:
        cachecontrol:
          max-age: 1h
          public: true
  thymeleaf:
    cache: true
    mode: HTML
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/dunamismax}
    username: ${DATABASE_USER:dunamismax}
    password: ${DATABASE_PASSWORD:dunamismax}
    hikari:
      pool-name: dunamismax-pool
      maximum-pool-size: 10
      minimum-idle: 2
  jooq:
    sql-dialect: POSTGRES
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${PORT:8080}
  forward-headers-strategy: native
  compression:
    enabled: true
    mime-types:
      - text/html
      - text/css
      - application/javascript
      - application/xml
      - application/json
      - image/svg+xml
  error:
    whitelabel:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: INFO
    com.dunamismax: INFO

site:
  host: dunamismax.com
