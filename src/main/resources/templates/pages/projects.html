<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::main})}">
<body>
<main>
  <section class="page-hero">
    <div class="section-inner">
      <p class="eyebrow">Projects</p>
      <h1>Live projects.</h1>
      <p class="lede">
        Rust-first tools, Python automation, PostgreSQL-backed
        operations, and references that support the next phase of work.
      </p>
    </div>
  </section>
  <section class="page-section">
    <div class="section-inner">
      <section class="project-group" th:each="entry : ${groups}">
        <header class="project-group__heading">
          <h2 th:text="${entry.key.label}">category</h2>
          <p th:text="${entry.key.description}">description</p>
        </header>
        <ul class="post-list">
          <li th:each="project : ${entry.value}">
            <div th:replace="~{fragments/project-card :: card(${project})}"></div>
          </li>
        </ul>
      </section>
    </div>
  </section>
</main>
</body>
</html>
