name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dunamismax-com-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Node deps (Tailwind)
        run: npm ci

      - name: Maven package
        run: ./mvnw --batch-mode clean package

      - name: Locate fat jar
        id: jar
        run: echo "path=target/dunamismax-site-0.1.0.jar" >> "$GITHUB_OUTPUT"

      - name: Copy jar to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: ${{ steps.jar.outputs.path }}
          target: /opt/dunamismax-site/
          strip_components: 1
          overwrite: true

      - name: Restart service
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -euo pipefail
            cd /opt/dunamismax-site
            ln -sf "$(ls -t dunamismax-site-*.jar | head -1)" dunamismax-site.jar
            sudo systemctl restart dunamismax-site.service
            sleep 3
            curl -fsS http://127.0.0.1:8080/actuator/health | grep -q '"status":"UP"'
