# dunamismax.com
#
# Intended to sit behind an external Caddy reverse proxy that handles TLS.
# The container serves the Astro static build through Caddy on port 80.
#
# Build and run:
#   docker compose up -d --build
#
# Rebuild after frontend or deploy-config changes:
#   docker compose build --no-cache web
#   docker compose up -d --force-recreate web

services:
  web:
    build: .
    restart: unless-stopped
    ports:
      - "8080:80"
    labels:
      - "app=dunamismax-com"
      - "description=Personal site served by Astro static output + Caddy"
